<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Aura | QR Code Generator</title>
    <meta name="description" content="Generate beautiful, customized QR codes instantly with QR Aura. High-quality downloads and custom styles.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <main class="app-container">
        <header>
            <h1>QR <span class="accent">Aura</span></h1>
            <p>The complete scannable toolkit.</p>
        </header>

        <nav class="mode-tabs">
            <button class="tab-btn active" data-mode="single">Single</button>
            <button class="tab-btn" data-mode="batch">Batch</button>
            <button class="tab-btn" data-mode="scan">Scanner</button>
        </nav>

        <section class="generator-card">
            <!-- Single Mode -->
            <div id="singleMode" class="mode-content active">
                <div class="input-group">
                    <label for="qrText">Content</label>
                    <input type="text" id="qrText" placeholder="https://example.com or your message" spellcheck="false">
                </div>
            </div>

            <!-- Batch Mode -->
            <div id="batchMode" class="mode-content">
                <div class="input-group">
                    <label for="batchText">Batch Content (One per line)</label>
                    <textarea id="batchText" placeholder="https://google.com&#10;https://github.com&#10;Custom Message" rows="5"></textarea>
                </div>
            </div>

            <!-- Scan Mode -->
            <div id="scanMode" class="mode-content">
                <div class="input-group">
                    <label>Upload QR Image to Scan</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="scanInput" accept="image/*">
                        <div class="file-btn">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h18a2 2 0 0 1 2 2z"></path><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span>Select Image</span>
                        </div>
                        <span id="scanFileName" class="file-name">No file chosen</span>
                    </div>
                </div>
                <div id="scanResult" class="scan-result-display">
                    <p class="scan-placeholder">Results will appear here...</p>
                </div>
            </div>

            <div class="customization-grid">
                <div class="input-group">
                    <label>FG Color</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="fgColor" value="#000000">
                    </div>
                </div>
                <div class="input-group">
                    <label>BG Color</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bgColor" value="#ffffff">
                    </div>
                </div>
                <div class="input-group">
                    <label>Size</label>
                    <select id="qrSize">
                        <option value="150">Small (150x150)</option>
                        <option value="300" selected>Medium (300x300)</option>
                        <option value="500">Large (500x500)</option>
                        <option value="1000">Extra Large (1000x1000)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Logo Overlay (Optional)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="logoInput" accept="image/*">
                        <div class="file-btn">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span>Choose Logo</span>
                        </div>
                        <span id="fileName" class="file-name">No file chosen</span>
                    </div>
                </div>
            </div>

            <button id="generateBtn" class="primary-btn">
                <span>Generate QR Code</span>
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>

            <div id="resultBox" class="result-box">
                <div class="qr-wrapper">
                    <img src="" id="qrImage" alt="Generated QR Code">
                    <div class="loader" id="loader"></div>
                </div>
                
                <div class="action-buttons">
                    <button id="downloadBtn" class="secondary-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download PNG
                    </button>
                    <button id="shareBtn" class="secondary-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        Share
                    </button>
                </div>
            </div>
        </section>

        <section class="history-section" id="historySection">
            <h3>Recent Creations</h3>
            <div class="history-grid" id="historyGrid">
                <!-- History items will be injected here -->
            </div>
            <button id="clearHistory" class="text-btn">Clear History</button>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 QR Aura. Built for elegance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
